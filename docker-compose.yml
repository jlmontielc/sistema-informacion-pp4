services:
  backend-flask:
    build: ./backend-flask
    ports:
      - "5000:5000"
    env_file: ./backend-flask/.env
    restart: unless-stopped

  backend-node:
    build: ./backend-node
    ports:
      - "3000:3000"
    env_file: ./backend-node/.env
    environment:
      - FLASK_IA_URL=http://backend-flask:5000
    depends_on:
      - backend-flask
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - REACT_APP_API_URL=http://localhost:3000/api
        - REACT_APP_IA_URL=http://localhost:5000/api/predict
    ports:
      - "80:80"
    depends_on:
      - backend-node
      - backend-flask
    restart: unless-stopped
